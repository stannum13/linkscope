name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: CLI smoke artifact build
        env:
          MPLBACKEND: Agg
        run: |
          photon-link benchmark --symbols 256 --yield-samples 4 --yield-symbols 128
          photon-link dashboard --out artifacts/demo/dashboard.html
          test -f data/benchmarks/tx_power_sweep.csv
          test -f data/benchmarks/thermal_drift_sweep.csv
          test -f data/benchmarks/yield_monte_carlo.csv
          test -f artifacts/demo/link_metrics.json
          test -f plots/eye_diagram.png
